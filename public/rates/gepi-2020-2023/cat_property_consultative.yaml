id: property-consultative-services
label: "Property & Consultative Services"
services:
  - id: strata-condominium-survey
    label: "Strata / Condominium Survey"
    unit_type: count
    unit: unit
    unit_display: "units"
    strategy: tiered_base_plus_unit
    tiered_base:
      tiers:
        - { range: [1, 2], base: 40000, per_unit: 0, excess_above: 2 }
        - { range: [3, null], base: 40000, per_unit: 5000, excess_above: 2 }
    parameters:
      - id: type
        label: "Plan Type"
        type: select
        options:
          - { id: draft, label: "Draft / Preliminary Plans", rate: 2500 }
          - { id: final, label: "Final Strata Plan", rate: 5000 }
    warnings:
      - "Draft Plans base fee is Php 5,000 for the first two units."

  - id: lease-area-survey
    label: "Lease Area Survey (NLA/GLA)"
    unit_type: area
    unit: sqm
    unit_display: "sq.m"
    strategy: lookup_table
    table:
      columns: [0]
      rows:
        "lt200": [15000]
        "200-400": [20500]
        "400-600": [26000]
        "600-800": [31500]
        "800-1000": [38000]
        "1000-1500": [51750]
        "1500-2000": [65500]
      row_logic:
        - { id: "lt200", min: 0, max: 199 }
        - { id: "200-400", min: 200, max: 399 }
        - { id: "400-600", min: 400, max: 599 }
        - { id: "600-800", min: 600, max: 799 }
        - { id: "800-1000", min: 800, max: 999 }
        - { id: "1000-1500", min: 1000, max: 1499 }
        - { id: "1500-2000", min: 1500, max: 2000 }
    modifiers:
      - id: location
        label: "Location Premium"
        type: percentage_add
        options:
          - { id: metro_city, label: "Metro Manila / Metro City", value: 0.3 }
          - { id: provincial, label: "Provincial", value: 0.0 }
      - id: multi_tenancy
        label: "Multi-Tenancy Discount"
        type: multiplier
        options:
          - { id: single, label: "Single Unit", value: 1.0 }
          - { id: multiple, label: "Multiple Units (One Visit)", value: 0.66 }

  - id: honoraria-lecturer
    label: "Honoraria (Lecturer/Resource Person)"
    unit_type: time
    unit: hour
    unit_display: "hours"
    strategy: time_based
    time_based:
      roles:
        ge_pd: 3294
        sge_pm: 2883
        ge_pm: 2522
        ge_v: 2183
        ge_iv: 1671
        ge_iii: 1280
        ge_ii: 997
        ge_i: 739
    warnings:
      - "Based on 50 participants; increased proportionately for more."
