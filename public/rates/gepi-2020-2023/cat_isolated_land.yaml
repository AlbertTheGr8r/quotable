          - { id: forestlands, label: "Forestlands", value: 0.5 }
          - { id: protected_areas, label: "Protected Areas", value: 0.5 }
          - { id: ancestral_lands, label: "Ancestral Lands", value: 0.5 }
          - { id: mixed_use, label: "Mixed Use", value: 1.5 }

